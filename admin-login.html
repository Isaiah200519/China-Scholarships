<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - China Scholarships Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- ===== HEADER & NAVIGATION ===== -->
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>ChinaScholarships</h1>
                </a>
                <div class="mobile-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
            </nav>
        </div>
    </header>

    <!-- ===== ADMIN LOGIN SECTION ===== -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-lock" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
                    <h1>Administrator Login</h1>
                    <p>Restricted Access</p>
                </div>

                <div class="alert alert-error" id="errorMessage" style="display: none;"></div>
                <div class="alert alert-success" id="successMessage" style="display: none;"></div>

                <form id="adminLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Admin Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter admin email" autocomplete="email"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-group">
                            <input type="password" id="password" name="password" placeholder="Enter your password"
                                autocomplete="current-password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility()"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary btn-full" id="loginBtn">
                        <span id="btnText">Login</span>
                        <i class="fas fa-spinner fa-spin" id="btnLoader" style="display: none;"></i>
                    </button>
                </form>

                <p class="auth-switch" style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px;">
                    <a href="admin-register.html"><i class="fas fa-user-plus"></i> Register as Administrator</a><br><br>
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>
                </p>
            </div>

            <div class="auth-illustration">
                <div class="illustration-content">
                    <i class="fas fa-shield-alt"></i>
                    <h3>Administration Panel</h3>
                    <p>Manage users, agents, and scholarships</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 China Scholarships Hub. All rights reserved.</p>
        </div>
    </footer>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/firebase-auth.js" defer></script>
    <script src="js/admin-login.js" defer></script>
</body>

</html>
